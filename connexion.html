<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
<link rel="icon" href="./images/favicon-32.png" type="image/png" sizes="32*32">
<link rel="icon" href="./images/favicon-16.png" type="image/png" sizes="16*16">
<link rel="apple-touch-icon" href="./images/favicon-180.png" type="image/svg+xml" sizes="180*180">
    <!-- <script src="https://kit.fontawesome.com/cc92400118.js" crossorigin="anonymous"></script> -->
    <title>Formulaire de connexion</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            color: white;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('./images/bg.jpg') no-repeat;
            background-size: cover;
            background-position: center;
        }
        form{
            width: 300px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            background: transparent;
            backdrop-filter: blur(15px);
        }
        h1{
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
       input{
        width: 100%;
        margin: 5px 0;
        border: 2px solid rgba(255, 255, 255, 0.5);
        padding: 6px;
        border-radius: 5px;
        background: transparent;
        font-size: 16px;
        font-weight: bolder;
        color: white;
       }
       select{
        width: 100%;
        margin: 5px 0;
        border: 2px solid rgba(255, 255, 255, 0.5);
        padding: 6px;
        border-radius: 5px;
        background: transparent;
        font-size: 16px;
        font-weight: bolder;
        color: white;
       }
       button:hover{
        background: aqua;
        color: black;
       }
       button{
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 40px;
        background: white;
        color: black;
        font-weight: bolder;
        font-size: 16px;
        cursor: pointer;
       }
       
       @media (max-width:360px) {
        form{
            width: 100%;
            height: 100vh;
        }
       }
    </style>
</head>
<body>
 
    <form action="">
        <h1>Connexion</h1>
        <label for="prenom">Entrez votre Prénom:</label> <br>
        <input type="text" name="prenom" id="prenom" placeholder="monprenom" required> <br> <br>
        <label for="nom">Entrez votre Nom:</label> <br>
        <input type="text" name="nom" id="nom" placeholder="monNom" required> <br><br>
        <label for="number">Entrez votre numéro de telephone:</label> <br>
        <input type="tel" name="number" id="number" placeholder="+24000000000" required > <br><br>
        <label for="email">Entrez votre address mail:</label> <br>
        <input type="email" name="
        email" id="email" placeholder="monemail@gmail.com" required> <br> <br>
        <label for="sexe">Sexe:</label>
        <br>
        <select name="sexe" id="sexe">
            <option value="homme">homme</option>
            <option value="femme">femme</option>
            <option value="autres">autres</option>
        </select>
         <br><br>
        <button id="send">Envoyer</button>
    </form>
    <script>

       /*recuperation */
       const button = document.getElementById('send');
       const name = document.getElementById('prenom');
       const nom = document.getElementById('nom');
       const number = document.getElementById('number');
       const email = document.getElementById('email');
       const select = document.querySelector('select');
       /*fin de la recuperation*/


       button.addEventListener('click', () => {
       const username = name.value.trim();
       const usersatname = nom.value.trim();
       const num = number.value.trim();
       const mail = email.value.trim();
       const sexe = select.value.trim();
       localStorage.setItem('name', username);
       localStorage.setItem('nom', usersatname);
       localStorage.setItem('numero', num);
       localStorage.setItem('adress', mail);
       localStorage.setItem('sexe', sexe);
      
       console.log(localStorage.getItem('sexe'));
       
        if (localStorage.getItem('name') && localStorage.getItem('nom') && localStorage.getItem('numero') && localStorage.getItem('adress') && localStorage.getItem('sexe')) {
            window.open('./rebour.html', '_self');
        } else {
            alert('Veuillez remplir tous les champs du formulaire avant de continuer.');
        }
       });
         
    </script>
</body>
</html>
