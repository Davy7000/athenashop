<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
<link rel="icon" href="./images/favicon-32.png" type="image/png" sizes="32*32">
<link rel="icon" href="./images/favicon-16.png" type="image/png" sizes="16*16">
<link rel="apple-touch-icon" href="./images/favicon-180.png" type="image/svg+xml" sizes="180*180">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        h1{
            text-align: center;
            color: rgb(53, 52, 52);
            font-weight: bolder;
        }
       p{
        font-weight: bolder;
       }
       .name{
        text-transform: capitalize;
       }
       .nom{
        text-transform: uppercase;
       }
       .home{
        width: 50px;
        height: 50px;
        background:black;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
       }
       .home a{
        color:white;
       }
       .genre{
        text-transform: capitalize;
       }
    </style>
    <title>Mon compte</title>
</head>
<body>
    <header>
        <div class="home"><a href="./index.html"><i class="fas fa-home"> </i> </a></div> <span></span>
    </header>
    <h1><i class="fa-solid fa-id-card"></i> Informations de votre compte Athéna shop:</h1>
 
    <fieldset>
        <legend>Information sur le client</legend>
           <p><i class="fa-solid fa-user"></i> Prénom: <span class="name">user firstname</span></p>
           <p><i class="fa-solid fa-user"></i> Nom: <span class="nom">user Name</span></p>
           <p><i class="fa-solid fa-phone"></i> Numéro de téléphone: <span class="numero">user number</span></p>
           <p><i class="fa-solid fa-envelope"></i> Adress mail: <span class="adress">user email</span></p>
           <p><i class="fa-solid fa-venus-mars"></i> Sexe: <span class="genre">user genre</span></p>
    </fieldset>

<script>
    //recuperation des balises
    const name = document.querySelector('.name');
    const nom = document.querySelector('.nom');
    const number = document.querySelector('.numero');
    const adress = document.querySelector('.adress');
    const genre = document.querySelector('.genre');
    // fin de la recuperation

    // recuperation du local storage
    const usergenre = localStorage.getItem('sexe');
    const username = localStorage.getItem('name');
    const usernom = localStorage.getItem('nom');
    const usernumber = localStorage.getItem('numero');
    const useradress = localStorage.getItem('adress');
    console.log(username, usernom, usernumber, useradress);
    // fin de la recuperation 

    // envoie des valeurs
    name.textContent = `${username}`;
    genre.textContent = `${usergenre}`;
    nom.textContent = `${usernom}`;
    adress.textContent = `${useradress}`;
    number.innerHTML = `${usernumber}`;
</script>
</body>
</html>
