</div>
     <script>
//recuperation du nom et prenom du client
const prenom = localStorage.getItem('name');
const nom = localStorage.getItem('nom');
        //message en boite
        //moi et jour en lettre

         const moisenlettre =["Janvier","Fevrier","Mars","Avril","Mai","Jui","Juillet","Aout","Septembre","Octobre","Novembre","Décembre"];

         const jourenlettre =["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
           // fin de la recuperation
        const message = document.getElementById('message');
        const affheure = document.querySelector('.heure');
        function durer() {
            //recuperation du temps et autre 
            const heure = new Date().getHours();
            const minutes = new Date().getMinutes();
            const secondes = new Date().getSeconds();
            const auj =new Date().getDay();
            const jour =new Date().getDate();
            const mois =new Date().getMonth();
            const anne =new Date().getFullYear();
           //fin de la recuperation
           // transformation du mois
           const moiss = moisenlettre[mois];
           const jours = jourenlettre[auj-1];
           // affichage de l'heure
      affheure.textContent = `${heure}H:${minutes}M:${secondes}S`;
        //fin affichage
             if (heure < 12) {
                 message.textContent = 'Bonjour,'+ ' ' + prenom.charAt(0).toUpperCase() + prenom.slice(1) + ' ' + nom.toUpperCase()
                 + ' ' + 'veuillez patienter votre page est en cours de chargement.';
             } else if(heure < 18) {
                message.textContent = 'Bon apres midi,'+ ' ' + prenom.charAt(0).toUpperCase() + prenom.slice(1) + ' ' + nom.toUpperCase() + ' ' + `veuillez patienter votre page est en cours de chargement.`;
             } else {
                   message.textContent = 'Bonsoir,'+ ' ' + prenom.charAt(0).toUpperCase() + prenom.slice(1) + ' ' + nom.toUpperCase()
                   + ' ' + 'veuillez patienter votre page est en cours de chargement.';
             }
        }
        
        // appel de la fonction 
        durer();

        // mise a jour des secondes 
        setInterval(durer,1000);

     </script>
